<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test the AI Caller</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .box {
      background: #1e293b;
      padding: 40px;
      border-radius: 10px;
      width: 100%;
      max-width: 350px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    h2 {
      margin-top: 0;
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      width: 100%;
      background: #22c55e;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #16a34a;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    #status {
      margin-top: 15px;
      font-size: 14px;
      opacity: 0.9;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Test Our AI Caller</h2>
    <p>Enter your number and the AI will call you shortly.</p>

    <input id="name" type="text" placeholder="Your Name" />
    <input id="phone" type="tel" placeholder="Phone Number (10 digits)" />

    <button id="demoBtn" onclick="startDemo()">Start Demo</button>

    <p id="status"></p>
  </div>

  <script>
    async function startDemo() {
      const status = document.getElementById("status");
      const button = document.getElementById("demoBtn");
      const name = document.getElementById("name").value.trim();
      let phone = document.getElementById("phone").value.trim();

      if (!name || !phone) {
        status.innerText = "Please enter your name and phone number.";
        return;
      }

      phone = phone.replace(/\D/g, "");

      if (phone.length !== 10) {
        status.innerText = "Please enter a valid 10 digit phone number.";
        return;
      }

      phone = "+1" + phone;

      status.innerText = "Calling you now...";
      button.disabled = true;

      try {
        const response = await fetch("https://goodfunding.app.n8n.cloud/webhook-test/59644c16-2a87-4e3e-9ed6-a0bb5823d6e2", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            name: name,
            phone: phone,
            source: "ai-caller-demo-page",
            website: window.location.hostname,
            timestamp: new Date().toISOString()
          })
        });

        const data = await response.text();
        console.log("Webhook response:", data);

        if (!response.ok) {
          status.innerText = "Webhook returned an error.";
          console.error("Webhook error:", response.status, data);
          button.disabled = false;
          return;
        }

        status.innerText = "The AI should call you shortly.";
      } catch (error) {
        console.error("Fetch error:", error);
        status.innerText = "Something went wrong. Please try again.";
      }

      button.disabled = false;
    }
  </script>
</body>
</html>
