<!DOCTYPE html>
<html>
<head>
  <title>Test the AI Caller</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: #1e293b;
      padding: 40px;
      border-radius: 10px;
      width: 350px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,.4);
    }

    h2 {
      margin-top: 0;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      width: 100%;
      background: #22c55e;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #16a34a;
    }

    #status {
      margin-top: 15px;
      font-size: 14px;
      opacity: .9;
    }
  </style>

</head>

<body>

<div class="box">

  <h2>Test Our AI Caller</h2>
  <p>Enter your number and the AI will call you shortly.</p>

  <input id="name" placeholder="Your Name" />
  <input id="phone" placeholder="Phone Number (10 digits)" />

  <button onclick="startDemo()">Start Demo</button>

  <p id="status"></p>

</div>

<script>

async function startDemo() {

  const status = document.getElementById("status")
  const name = document.getElementById("name").value
  let phone = document.getElementById("phone").value

  if(!name || !phone){
    status.innerText = "Please enter your name and phone number."
    return
  }

  phone = phone.replace(/\D/g, "")

  if(phone.length !== 10){
    status.innerText = "Please enter a valid 10 digit phone number."
    return
  }

  phone = "+1" + phone

  status.innerText = "Calling you now..."

  try {

    const response = await fetch("https://goodfunding.app.n8n.cloud/webhook/59644c16-2a87-4e3e-9ed6-a0bb5823d6e2", {

      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify({

        name: name,
        phone: phone,

        source: "ai-caller-demo-page",
        website: window.location.hostname,
        timestamp: new Date().toISOString()

      })

    })

    const data = await response.text()

    console.log("Webhook response:", data)

    status.innerText = "The AI should call you shortly."

  } catch (error) {

    console.error(error)

    status.innerText = "Something went wrong. Please try again."

  }

}

</script>

</body>
</html>
